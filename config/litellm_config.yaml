model_list:
- model_name: glm-5.2
  litellm_params:
    model: openai/zai-org/GLM-5.2-FP8
    api_base: os.environ/GLM_API_BASE
    api_key: os.environ/GLM_API_KEY
- model_name: qwen3-coder-30b
  litellm_params:
    model: openai/Qwen/Qwen3-Coder-30B-A3B-Instruct
    api_base: os.environ/QWEN_CODER_API_BASE
    api_key: os.environ/QWEN_CODER_API_KEY
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 600
litellm_settings:
  request_timeout: 600
  drop_params: true
  set_verbose: false
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
